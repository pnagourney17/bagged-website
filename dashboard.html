<!DOCTYPE html>
<html>

<head>
    <title>Bagged | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --white: #ffffff;
            --gray: #f9f9f9;
            --border: #eeeeee;
            --success: #27ae60;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            background: var(--white);
            color: var(--black);
        }

        /* Slim Icon Sidebar */
        .sidebar {
            width: 68px;
            height: 100vh;
            background: #fff;
            border-right: 1px solid #eee;
            position: fixed;
            box-sizing: border-box;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        .sidebar-logo {
            margin-bottom: 32px;
        }

        .sidebar-logo img {
            width: 30px;
            height: 30px;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex: 1;
        }

        .nav-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            width: 52px;
            padding: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: #000;
        }

        .nav-icon:hover {
            background: #f5f5f5;
        }

        .nav-icon.active {
            background: #f0f0f0;
        }

        .nav-icon svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .nav-icon span {
            font-size: 8px;
            letter-spacing: 0.3px;
            text-transform: lowercase;
            font-weight: 500;
        }

        .sidebar-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding-bottom: 8px;
        }

        .sidebar-bottom .nav-icon {
            color: #000;
        }

        .sidebar-bottom .nav-icon:hover {
            background: #f5f5f5;
        }

        /* Main Layout */
        .main-content {
            margin-left: 68px;
            padding: 50px 60px;
            width: 100%;
            box-sizing: border-box;
        }

        header h1 {
            display: none;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 20px;
        }

        /* Board Grid (Pinterest-style) */
        .boards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }

        .board-card {
            cursor: pointer;
            transition: transform 0.2s;
        }

        .board-card:hover {
            transform: translateY(-4px);
        }

        .board-collage {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 2px;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 1;
            background: #f0f0f0;
        }

        .board-collage .collage-main {
            grid-row: 1 / 3;
            grid-column: 1;
        }

        .board-collage img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .board-collage .collage-empty {
            background: #e8e8e8;
        }

        .board-name {
            font-size: 16px;
            font-weight: 600;
            text-transform: capitalize;
            margin-top: 12px;
            color: #111;
        }

        .board-count {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        /* Board Detail View */
        .board-detail-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .back-btn {
            background: none;
            border: 1px solid #ddd;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 14px;
            color: #555;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }

        .back-btn:hover {
            border-color: #000;
            color: #000;
        }

        .board-detail-title {
            font-size: 24px;
            font-weight: 600;
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        .board-detail-count {
            font-size: 13px;
            color: #888;
            margin-left: auto;
        }



        /* Product Grid */
        .bags-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: white;
            text-transform: capitalize;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
            height: 100%;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background: var(--gray);
            margin-bottom: 15px;
            border-radius: 12px;
        }

        .product-card .name {
            min-height: 40px;
            line-height: 1.4;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .product-card .cta-row {
            margin-top: auto;
        }

        .brand {
            font-size: 10px;
            color: #888;
            letter-spacing: 1px;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: lowercase;
        }

        .name {
            font-size: 14px;
            margin-bottom: 8px;
            line-height: 1.4;
            color: #222;
        }

        .price {
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 12px;
        }

        .remove-btn {
            align-self: flex-start;
            padding: 0;
            cursor: pointer;
            color: #ff4d4d;
            border: none;
            background: none;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: lowercase;
            opacity: 0.6;
        }

        .remove-btn:hover {
            opacity: 1;
        }

        /* Auth Gate */
        #dashboard-login-gate {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            text-align: center;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        #dashboard-login-gate .gate-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        #dashboard-login-gate .gate-logo img {
            width: 36px;
            height: 36px;
        }

        #dashboard-login-gate .gate-logo h2 {
            font-size: 26px;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 0;
        }

        #dashboard-login-gate p {
            color: #888;
            font-size: 13px;
            margin-bottom: 24px;
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }

        .gate-form {
            width: 300px;
        }

        .gate-form input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            box-sizing: border-box;
            background: #fafafa;
            transition: border 0.2s;
        }

        .gate-form input:focus {
            border-color: #000;
            background: #fff;
        }

        .gate-form button {
            width: 100%;
            padding: 13px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.25s;
            margin-top: 4px;
        }

        .gate-form button:hover {
            background: #222;
        }

        .gate-password-wrapper {
            position: relative;
            width: 100%;
        }

        .gate-password-wrapper input {
            padding-right: 42px;
        }

        .gate-toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(calc(-50% - 5px));
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: #bbb;
            font-size: 10px;
            letter-spacing: 0.5px;
            text-transform: lowercase;
            line-height: 1;
            transition: color 0.2s, font-weight 0.2s;
            font-family: inherit;
        }

        .gate-toggle-password:hover {
            color: #555;
        }

        .gate-toggle-password.active {
            color: #000;
            font-weight: 700;
        }

        #gate-confirm-wrapper {
            display: none;
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            opacity: 0;
        }

        #gate-confirm-wrapper.show {
            display: block;
            max-height: 60px;
            opacity: 1;
        }

        #dashboard-auth-error {
            font-size: 11px;
            color: #d63031;
            margin-top: 12px;
            min-height: 16px;
        }

        .gate-toggle {
            margin-top: 16px;
            font-size: 11px;
            color: #888;
        }

        .gate-toggle a {
            color: #000;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="Icon.png" alt="Bagged">
        </div>
        <div class="sidebar-nav">
            <a class="nav-icon active" href="dashboard.html" title="Home">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>home</span>
            </a>
            <a class="nav-icon" href="#" title="Explore">
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <span>explore</span>
            </a>
            <a class="nav-icon" href="#" id="nav-create-wishlist" title="Create a Wishlist">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <span>create</span>
            </a>
            <a class="nav-icon" href="#" title="About">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                <span>about</span>
            </a>
        </div>
        <div class="sidebar-bottom">
            <div class="sidebar-user-email" id="sidebar-email" style="display:none;"></div>
            <a class="nav-icon" href="#" id="sidebar-signout" title="Sign Out">
                <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>sign out</span>
            </a>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div id="cart-widget" style="position: relative;">
                <button id="cart-toggle"
                    style="background: none; border: 1px solid #eee; padding: 10px 16px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 12px; text-transform: lowercase; letter-spacing: 1px; border-radius: 4px;">
                    <img src="Icon.png" alt="" style="width: 16px; height: 16px;">
                    <span>checkout</span>
                    <span id="cart-count"
                        style="background: black; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px;">0</span>
                </button>
                <div id="cart-dropdown"
                    style="display: none; position: absolute; right: 0; top: 100%; margin-top: 10px; background: white; border: 1px solid #eee; border-radius: 4px; width: 300px; max-height: 400px; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); z-index: 1000;">
                    <div id="cart-items" style="padding: 15px;">
                        <p style="color: #888; font-size: 12px; text-transform: lowercase; margin: 0;">no items in
                            checkout</p>
                    </div>
                    <div style="border-top: 1px solid #eee; padding: 15px;">
                        <button id="checkout-all-btn"
                            style="width: 100%; background: black; color: white; border: none; padding: 12px; cursor: pointer; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; border-radius: 2px; opacity: 0.5;">
                            Checkout All
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="bags-container">
            <p style="text-transform: lowercase; color: #888;">syncing with cloud...</p>
        </div>
    </div>

    <!-- Auth gate (shown when not logged in) -->
    <div id="dashboard-login-gate" style="display: none;">
        <div class="gate-logo">
            <img src="Icon.png" alt="Bagged">
            <h2>BAGGED</h2>
        </div>
        <p>sign in to view your collections</p>
        <div class="gate-form">
            <input type="email" id="gate-email" placeholder="email address">
            <div class="gate-password-wrapper">
                <input type="password" id="gate-password" placeholder="password">
                <button type="button" class="gate-toggle-password" id="toggle-gate-password" title="Show password">show</button>
            </div>
            <div id="gate-confirm-wrapper">
                <div class="gate-password-wrapper">
                    <input type="password" id="gate-confirm-password" placeholder="confirm password">
                    <button type="button" class="gate-toggle-password" id="toggle-gate-confirm" title="Show password">show</button>
                </div>
            </div>
            <button id="gate-submit">sign in</button>
        </div>
        <div id="dashboard-auth-error"></div>
        <div class="gate-toggle">
            <span id="gate-toggle-text">don't have an account? </span>
            <a id="gate-toggle-link">create one</a>
        </div>
    </div>

    <!-- Create Bag Modal -->
    <div id="create-bag-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); z-index: 2000; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease;">
        <div style="background: #fff; padding: 40px; border: 1px solid #eee; border-radius: 12px; width: 100%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); position: relative; text-align: center;">
            <button id="close-create-modal" style="position: absolute; top: 12px; right: 12px; background: none; border: none; font-size: 20px; cursor: pointer; color: #999;">&times;</button>
            <h3 style="margin: 0 0 8px 0; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; font-family: 'Inter', sans-serif;">CREATE A BAG</h3>
            <p style="font-size: 11px; color: #888; text-transform: lowercase; margin-bottom: 24px; font-family: 'Inter', sans-serif;">name your new collection</p>
            <input type="text" id="bag-modal-input" placeholder="e.g. summer wishlist" style="width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 13px; font-family: 'Inter', sans-serif; margin-bottom: 16px; background: #fafafa; outline: none; box-sizing: border-box;">
            <button id="submit-create-bag" style="width: 100%; padding: 14px; background: #000; color: #fff; border: none; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.2s;">CREATE</button>
        </div>
    </div>

    <script src="firebase-app.js"></script>
    <script src="firebase-auth.js"></script>
    <script src="firebase-firestore.js"></script>
    <script src="dashboard.js"></script>
</body>

</html>
