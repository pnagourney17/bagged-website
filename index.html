<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bagged - Everything you love...</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <!-- Firebase SDks -->
    <script src="firebase-app.js"></script>
    <script src="firebase-auth.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --gray: #000000;
            --border: #dddddd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 60px;
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text);
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .nav-logo img {
            width: 24px;
            height: 24px;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--gray);
            font-size: 13px;
            text-transform: lowercase;
            letter-spacing: 1px;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--text);
        }

        .btn-primary {
            background: var(--text);
            color: var(--bg) !important;
            padding: 10px 24px;
            border-radius: 4px;
            text-transform: uppercase !important;
            font-weight: 600;
            letter-spacing: 1.5px;
            cursor: pointer;
            border: none;
            text-decoration: none;
            font-size: 11px !important;
            transition: opacity 0.2s;
        }

        .btn-primary:hover {
            opacity: 0.8;
        }

        /* Hero Section */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 120px 20px;
            flex: 1;
        }

        .hero-sub {
            font-size: 24px;
            color: #000000;
            font-weight: 300;
            margin-bottom: 20px;
        }

        .hero-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            margin-bottom: 30px;
        }

        .hero-logo {
            width: 72px;
            height: 72px;
            object-fit: contain;
        }

        .hero-title {
            font-size: 72px;
            font-weight: 300;
            color: #000000;
            letter-spacing: 6px;
            line-height: 1;
        }

        .hero-desc {
            font-size: 18px;
            color: #000000;
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .hero-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px 24px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1.5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 11px;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            border-color: var(--text);
        }

        /* Features Section */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            padding: 80px 60px;
            background: #fafafa;
            border-top: 1px solid var(--border);
        }

        .feature-card {
            text-align: center;
            padding: 40px 20px;
        }

        .feature-icon {
            font-size: 32px;
            margin-bottom: 20px;
            color: var(--text);
        }

        .feature-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: lowercase;
            letter-spacing: 1px;
        }

        .feature-desc {
            font-size: 14px;
            color: var(--gray);
            line-height: 1.6;
        }

        /* Footer */
        footer {
            padding: 40px 60px;
            text-align: center;
            border-top: 1px solid var(--border);
            color: var(--gray);
            font-size: 12px;
            text-transform: lowercase;
            letter-spacing: 1px;
        }

        /* Modal Auth Container */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .auth-modal {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            position: relative;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }

        .modal-overlay.active .auth-modal {
            transform: translateY(0);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--gray);
            line-height: 1;
        }

        .close-modal:hover {
            color: var(--text);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header img {
            width: 32px;
            height: 32px;
            margin-bottom: 12px;
        }

        .auth-header h2 {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .auth-form input {
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 13px;
            outline: none;
            font-family: inherit;
        }

        .auth-form input:focus {
            border-color: #000000;
        }

        .auth-password-wrapper {
            position: relative;
            width: 100%;
        }

        .auth-password-wrapper input {
            width: 100%;
            padding-right: 48px;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: #888;
            font-size: 11px;
            letter-spacing: 0.5px;
            text-transform: lowercase;
            line-height: 1;
            transition: color 0.2s, font-weight 0.2s;
            font-family: inherit;
        }

        .toggle-password:hover {
            color: #444;
        }

        .toggle-password.active {
            color: #000;
            font-weight: 600;
        }

        #auth-confirm-wrapper {
            display: none;
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            opacity: 0;
        }

        #auth-confirm-wrapper.show {
            display: block;
            max-height: 80px;
            opacity: 1;
        }

        .auth-btn {
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 14px;
            border-radius: 4px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 8px;
        }

        #auth-error {
            color: #d63031;
            font-size: 12px;
            text-align: center;
            min-height: 15px;
            margin-top: 12px;
        }

        .auth-switch {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--gray);
        }

        .auth-switch a {
            color: var(--text);
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            nav {
                padding: 16px;
                flex-direction: column;
                gap: 16px;
            }
            .nav-links {
                gap: 12px;
                width: 100%;
                justify-content: center;
            }
            .hero {
                padding: 40px 16px;
            }
            .hero-brand {
                flex-direction: column;
                gap: 12px;
            }
            .hero-title {
                font-size: 42px;
                letter-spacing: 4px;
            }
            .hero-logo {
                width: 56px;
                height: 56px;
            }
            .hero-sub {
                font-size: 18px;
            }
            .hero-desc {
                font-size: 14px;
            }
            .hero-actions {
                flex-direction: column;
                width: 100%;
                gap: 12px;
            }
            .hero-actions button {
                width: 100%;
                padding: 14px;
            }
            .auth-modal {
                padding: 30px 20px;
                width: 92%;
                margin: 20px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="nav-logo">
            <img src="icon.png" alt="Bagged">
            BAGGED
        </a>
        <div class="nav-links">
            <a href="#" class="open-auth-btn" data-mode="login">Sign In</a>
            <a href="#" class="btn-primary open-auth-btn" data-mode="signup">Get Started</a>
        </div>
    </nav>

    <div class="hero">
        <h2 class="hero-sub">Everything you love...</h2>
        <div class="hero-brand">
            <img src="icon.png" alt="Bagged Logo" class="hero-logo">
            <h1 class="hero-title">BAGGED</h1>
        </div>
        <p class="hero-desc">Your taste, your tabs, your wishlist—all Bagged up in one sleek simple dashboard.</p>
        <div class="hero-actions">
            <button class="btn-primary open-auth-btn" data-mode="signup">Sign Up for Free</button>
            <button class="btn-outline open-auth-btn" data-mode="login">Sign In</button>
        </div>
    </div>



    <footer>
        &copy; 2026 Bagged. Built for your taste.
    </footer>

    <!-- Auth Modal Overlay -->
    <div class="modal-overlay" id="auth-modal-overlay">
        <div class="auth-modal">
            <button class="close-modal" id="close-modal">&times;</button>
            <div class="auth-header">
                <img src="icon.png" alt="Bagged">
                <h2 id="auth-title">SIGN IN</h2>
            </div>
            
            <form class="auth-form" id="auth-form">
                <input type="email" id="auth-email" placeholder="email address" required>
                
                <div class="auth-password-wrapper">
                    <input type="password" id="auth-password" placeholder="password" required>
                    <button type="button" class="toggle-password" id="toggle-auth-password">show</button>
                </div>

                <div id="auth-confirm-wrapper">
                    <div class="auth-password-wrapper">
                        <input type="password" id="auth-confirm-password" placeholder="confirm password">
                        <button type="button" class="toggle-password" id="toggle-auth-confirm">show</button>
                    </div>
                </div>

                <button type="submit" class="auth-btn" id="auth-submit-btn">Continue</button>
            </form>
            <div id="auth-error"></div>

            <div class="auth-switch">
                <span id="auth-switch-text">New to Bagged?</span>
                <a id="auth-switch-link">Create an account</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-auth-compat.js"></script>
    <script src="landing.js"></script>
</body>
</html>
